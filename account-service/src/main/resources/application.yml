server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/banking_platform}
    username: ${SPRING_DATASOURCE_USERNAME:banking}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

banking:
  jwt-secret: ${BANKING_JWT_SECRET}
  seed-admin-password: ${BANKING_SEED_ADMIN_PASSWORD}
  seed-admin-pin: ${BANKING_SEED_ADMIN_PIN}
  password-reset:
    otp-ttl-minutes: ${BANKING_PASSWORD_RESET_OTP_TTL_MINUTES:10}
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:}
  notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
  mail:
    enabled: ${BANKING_MAIL_ENABLED:false}
    from: ${BANKING_MAIL_FROM:no-reply@ewallet.local}
    smtp-host: ${BANKING_MAIL_SMTP_HOST:}
    smtp-port: ${BANKING_MAIL_SMTP_PORT:587}
    smtp-username: ${BANKING_MAIL_SMTP_USERNAME:}
    smtp-password: ${BANKING_MAIL_SMTP_PASSWORD:}
    smtp-starttls: ${BANKING_MAIL_SMTP_STARTTLS:true}
  grpc:
    port: 9090
