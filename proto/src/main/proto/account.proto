syntax = "proto3";

package ewallet.account.v1;

option java_multiple_files = true;
option java_package = "com.ewallet.contract.account.v1";

service AccountQueryService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc LookupAccount(LookupAccountRequest) returns (LookupAccountResponse);
}

message GetBalanceRequest {
  string account_id = 1;
}

message GetBalanceResponse {
  string account_id = 1;
  string balance = 2;
  string currency = 3;
}

message LookupAccountRequest {
  oneof key {
    string email = 1;
    string phone = 2;
  }
}

message LookupAccountResponse {
  string account_id = 1;
  string status = 2;
  string currency = 3;
}
